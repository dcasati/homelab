- apiVersion: v1
  data:
    generate-certs.sh: |
      #!/bin/sh
      set -e
      CERT_DIR="/etc/nginx/certs"
      if [ ! -f "$CERT_DIR/server.crt" ]; then
        echo "Generating self-signed certificate..."
        mkdir -p "$CERT_DIR"
        openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
          -keyout "$CERT_DIR/server.key" \
          -out "$CERT_DIR/server.crt" \
          -subj "/CN=caal.local" \
          -addext "subjectAltName=DNS:localhost,IP:REDACTED,IP:REDACTED,IP:127.0.0.1" 2>/dev/null
        echo "Self-signed certificate generated"
      else
        echo "Using existing certificate"
      fi
    nginx.conf: |
      events {
          worker_connections 1024;
      }

      http {
          # HTTPS - Frontend
          server {
              listen 3443 ssl;
              server_name _;

              ssl_certificate /etc/nginx/certs/server.crt;
              ssl_certificate_key /etc/nginx/certs/server.key;
              ssl_protocols TLSv1.2 TLSv1.3;

              location / {
                  proxy_pass http://frontend.caal.svc.cluster.local:3000;
                  proxy_http_version 1.1;
                  proxy_set_header Upgrade $http_upgrade;
                  proxy_set_header Connection "upgrade";
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
              }
          }

          # HTTPS - LiveKit WebSocket (port 7443)
          server {
              listen 7443 ssl;
              server_name _;

              ssl_certificate /etc/nginx/certs/server.crt;
              ssl_certificate_key /etc/nginx/certs/server.key;
              ssl_protocols TLSv1.2 TLSv1.3;

              location / {
                  proxy_pass http://livekit.caal.svc.cluster.local:7880;
                  proxy_http_version 1.1;
                  proxy_set_header Upgrade $http_upgrade;
                  proxy_set_header Connection "upgrade";
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
              }
          }
      }
  kind: ConfigMap
  metadata:
